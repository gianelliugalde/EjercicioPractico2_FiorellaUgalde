<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ffe4ec, #ffd6e7);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 20px;
            border: none;
        }

        .card-header {
            background-color: #ff6fa5;
            color: white;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }

        .btn-pink {
            background-color: #ff6fa5;
            color: white;
            border-radius: 10px;
        }

        .btn-pink:hover {
            background-color: #ff4f8b;
            color: white;
        }

        .btn-outline-pink {
            border: 2px solid #ff6fa5;
            color: #ff6fa5;
            border-radius: 10px;
        }

        .btn-outline-pink:hover {
            background-color: #ff6fa5;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header">
            <h2>Plataforma de eventos</h2>
        </div>

        <div class="card-body text-center">
            <p>Has iniciado sesión correctamente.</p>

            <div class="d-grid gap-2 mt-4">

                <!-- TODOS LOS ROLES -->
                <a href="/eventos" class="btn btn-pink">Ver eventos</a>

                <!-- SOLO ADMIN -->
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/usuarios" class="btn btn-outline-pink">Usuarios</a>
                    <a href="/roles" class="btn btn-outline-pink">Roles</a>
                    <a href="/consultas" class="btn btn-outline-pink">Consultas</a>
                </div>

                <!-- ADMIN + ORGANIZADOR -->
                <div sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">
                    <a href="/eventos/nuevo" class="btn btn-outline-pink">Crear evento</a>
                </div>

                <!-- CLIENTE -->
                <div sec:authorize="hasRole('CLIENTE')">
                    <p class="mt-3">Acceso de cliente: solo visualización de eventos.</p>
                </div>

                <a href="/logout" class="btn btn-danger mt-3">Cerrar sesión</a>

            </div>
        </div>
    </div>
</div>

</body>
</html>
