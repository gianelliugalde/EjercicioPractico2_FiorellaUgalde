<html lang="es">
<head>
    <style>
    body {
        background: linear-gradient(to right, #ffe4ec, #ffd6e7);
        font-family: 'Segoe UI', sans-serif;
    }

    h2, h3, h5, label {
        color: #c94f7c;
    }

    .card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .table {
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
    }

    .table-dark {
        background-color: #ff6fa5 !important;
        color: white !important;
    }

    .btn-success,
    .btn-primary,
    .btn-info {
        background-color: #ff6fa5;
        border-color: #ff6fa5;
        color: white;
        border-radius: 10px;
    }

    .btn-success:hover,
    .btn-primary:hover,
    .btn-info:hover {
        background-color: #ff4f8b;
        border-color: #ff4f8b;
        color: white;
    }

    .btn-secondary {
        background-color: #f8c7d8;
        border-color: #f8c7d8;
        color: #7a3450;
        border-radius: 10px;
    }

    .btn-secondary:hover {
        background-color: #f3b3cb;
        border-color: #f3b3cb;
        color: #7a3450;
    }

    .btn-danger {
        border-radius: 10px;
    }

    .form-control,
    .form-select,
    textarea {
        border-radius: 10px;
        border: 1px solid #f3b3cb;
    }

    .container {
        margin-top: 30px;
    }
</style>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Gestión de Usuarios</h2>
    <a class="btn btn-success mb-3" href="/usuarios/nuevo">Nuevo usuario</a>
    <a class="btn btn-secondary mb-3" href="/">Inicio</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${listaUsuarios}">
                <td th:text="${usuario.id}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.rol.nombre}"></td>
                <td th:text="${usuario.activo}"></td>
                <td>
                    <a class="btn btn-info btn-sm" th:href="@{/usuarios/detalle/{id}(id=${usuario.id})}">Detalle</a>
                    <a class="btn btn-primary btn-sm" th:href="@{/usuarios/editar/{id}(id=${usuario.id})}">Editar</a>
                    <a class="btn btn-danger btn-sm" th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
