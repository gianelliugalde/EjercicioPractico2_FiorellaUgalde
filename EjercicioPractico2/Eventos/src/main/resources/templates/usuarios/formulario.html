<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
    body {
        background: linear-gradient(to right, #ffe4ec, #ffd6e7);
        font-family: 'Segoe UI', sans-serif;
    }

    h2, h3, h5, label {
        color: #c94f7c;
    }

    .card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .table {
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
    }

    .table-dark {
        background-color: #ff6fa5 !important;
        color: white !important;
    }

    .btn-success,
    .btn-primary,
    .btn-info {
        background-color: #ff6fa5;
        border-color: #ff6fa5;
        color: white;
        border-radius: 10px;
    }

    .btn-success:hover,
    .btn-primary:hover,
    .btn-info:hover {
        background-color: #ff4f8b;
        border-color: #ff4f8b;
        color: white;
    }

    .btn-secondary {
        background-color: #f8c7d8;
        border-color: #f8c7d8;
        color: #7a3450;
        border-radius: 10px;
    }

    .btn-secondary:hover {
        background-color: #f3b3cb;
        border-color: #f3b3cb;
        color: #7a3450;
    }

    .btn-danger {
        border-radius: 10px;
    }

    .form-control,
    .form-select,
    textarea {
        border-radius: 10px;
        border: 1px solid #f3b3cb;
    }

    .container {
        margin-top: 30px;
    }
</style>
    <meta charset="UTF-8">
    <title>Formulario Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Formulario de Usuario</h2>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="text" th:field="*{password}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Rol</label>
            <select name="rolId" class="form-select" required>
                <option value="">Seleccione un rol</option>
                <option th:each="rol : ${listaRoles}"
                        th:value="${rol.id}"
                        th:text="${rol.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label>Activo</label>
            <select th:field="*{activo}" class="form-select">
                <option th:value="true">true</option>
                <option th:value="false">false</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/usuarios" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
