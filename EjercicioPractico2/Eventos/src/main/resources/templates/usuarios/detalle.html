<html lang="es">
<head>
    <style>
    body {
        background: linear-gradient(to right, #ffe4ec, #ffd6e7);
        font-family: 'Segoe UI', sans-serif;
    }

    h2, h3, h5, label {
        color: #c94f7c;
    }

    .card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .table {
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
    }

    .table-dark {
        background-color: #ff6fa5 !important;
        color: white !important;
    }

    .btn-success,
    .btn-primary,
    .btn-info {
        background-color: #ff6fa5;
        border-color: #ff6fa5;
        color: white;
        border-radius: 10px;
    }

    .btn-success:hover,
    .btn-primary:hover,
    .btn-info:hover {
        background-color: #ff4f8b;
        border-color: #ff4f8b;
        color: white;
    }

    .btn-secondary {
        background-color: #f8c7d8;
        border-color: #f8c7d8;
        color: #7a3450;
        border-radius: 10px;
    }

    .btn-secondary:hover {
        background-color: #f3b3cb;
        border-color: #f3b3cb;
        color: #7a3450;
    }

    .btn-danger {
        border-radius: 10px;
    }

    .form-control,
    .form-select,
    textarea {
        border-radius: 10px;
        border: 1px solid #f3b3cb;
    }

    .container {
        margin-top: 30px;
    }
</style>
    <meta charset="UTF-8">
    <title>Detalle Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Detalle del Usuario</h2>

    <p><strong>ID:</strong> <span th:text="${usuario.id}"></span></p>
    <p><strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span></p>
    <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
    <p><strong>Rol:</strong> <span th:text="${usuario.rol.nombre}"></span></p>
    <p><strong>Activo:</strong> <span th:text="${usuario.activo}"></span></p>

    <a href="/usuarios" class="btn btn-secondary">Volver</a>
</div>
</body>
</html>
