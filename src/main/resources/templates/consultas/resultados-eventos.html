<!DOCTYPE html>
<html lang="es">
<head>
    <style>
    body {
        background: linear-gradient(to right, #ffe4ec, #ffd6e7);
        font-family: 'Segoe UI', sans-serif;
    }

    h2, h3, h5, label {
        color: #c94f7c;
    }

    .card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .table {
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
    }

    .table-dark {
        background-color: #ff6fa5 !important;
        color: white !important;
    }

    .btn-success,
    .btn-primary,
    .btn-info {
        background-color: #ff6fa5;
        border-color: #ff6fa5;
        color: white;
        border-radius: 10px;
    }

    .btn-success:hover,
    .btn-primary:hover,
    .btn-info:hover {
        background-color: #ff4f8b;
        border-color: #ff4f8b;
        color: white;
    }

    .btn-secondary {
        background-color: #f8c7d8;
        border-color: #f8c7d8;
        color: #7a3450;
        border-radius: 10px;
    }

    .btn-secondary:hover {
        background-color: #f3b3cb;
        border-color: #f3b3cb;
        color: #7a3450;
    }

    .btn-danger {
        border-radius: 10px;
    }

    .form-control,
    .form-select,
    textarea {
        border-radius: 10px;
        border: 1px solid #f3b3cb;
    }

    .container {
        margin-top: 30px;
    }
</style>
    <meta charset="UTF-8">
    <title>Resultados Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 th:text="${titulo}"></h2>
    <a class="btn btn-secondary mb-3" href="/consultas">Volver</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Capacidad</th>
                <th>Activo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="evento : ${resultadosEventos}">
                <td th:text="${evento.id}"></td>
                <td th:text="${evento.nombre}"></td>
                <td th:text="${evento.descripcion}"></td>
                <td th:text="${evento.fecha}"></td>
                <td th:text="${evento.capacidad}"></td>
                <td th:text="${evento.activo}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
